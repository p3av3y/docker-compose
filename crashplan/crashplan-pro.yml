# Crashplan-pro

services:
  crashplan-pro:
    image: jlesage/crashplan-pro:latest
    container_name: crashplan-pro
    hostname: crashplan-pro
    restart: unless-stopped
    networks:
      - pvnet
    ports:
      - 5800:5800
    environment:
      - TZ=America\Chicago
      - PUID=3001
      - PGID=3001
      #- TZ=${TZ}
      #- PUID=${PUID}
      #- PGID=${PGID}
      - CRASHPLAN_SRV_MAX_MEM=8192M
    volumes:
      - ${DOCKER_APP_BASE_PATH}/appdata/crashplan-pro:/config
      - /mnt/galaxy:/storage/galaxy
      - /mnt/nebula:/storage/nebula
    labels:
      - "com.centurylinklabs.watchtower.enable=true"   

networks:
  pvnet:
    external: true
