# Watchtower

services:
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    hostname: watchtower
    command:
      - --cleanup=true
    restart: always
    networks:
      - pvnet
    #ports:
    #  - "8089:8080"    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      
networks:
  pvnet:
    external: true
