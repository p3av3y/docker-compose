# n8n

services:
  n8n-db:
    container_name: n8n_db
    image: postgres:16
    restart: unless-stopped
    networks:
      - pvnet
    env_file: 
      - /env-files/n8n.env 
    environment:
      - POSTGRES_DB=n8n
      # - POSTGRES_USER=${DB_USERNAME}
      # - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ${DOCKER_APP_BASE_PATH}/n8n/postgres:/var/lib/postgresql/data

  n8n:
    container_name: n8n
    image: docker.io/n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      - n8n-db
    networks:
      - pvnet
    env_file: 
      - /env-files/n8n.env
    ports:
      - 5678:5678 # Access at http://<NAS-IP>:5678
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      # - DB_POSTGRESDB_USER=${DB_USERNAME}
      # - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - N8N_HOST=n8n.peav.us  # Change to your domain in NPM later
      - GENERIC_TIMEZONE=${TZ}
      - TZ=${TZ}
      # Required for some integrations to work behind Nginx Proxy Manager
      - N8N_SECURE_COOKIE=false 
    volumes:
      - ${DOCKER_APP_BASE_PATH}/n8n/data:/home/node/.n8n
      # Optional: Map a folder for n8n to "watch" or save files to on your HDD
      # - ${NAS_GALAXY_BASE_PATH}/automation_files:/files

networks:
  pvnet:
    external: true
